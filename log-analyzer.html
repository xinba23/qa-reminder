<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weelife 日志自动分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#0f1117;--s1:#1a1d27;--s2:#242836;--s3:#2e3345;--s4:#363b50;
  --bd:#2e3345;--bd2:#3a3f52;
  --t1:#e4e6ed;--t2:#9ca3b8;--t3:#6b7280;--t4:#4b5060;
  --ac:#6c8cff;--ac2:rgba(108,140,255,.12);
  --gn:#34d399;--gn2:rgba(52,211,153,.12);
  --yl:#fbbf24;--yl2:rgba(251,191,36,.12);
  --rd:#f87171;--rd2:rgba(248,113,113,.12);
  --pp:#a78bfa;--pp2:rgba(167,139,250,.12);
  --og:#fb923c;--og2:rgba(251,146,60,.12);
  --cy:#22d3ee;--cy2:rgba(34,211,238,.12);
  --r:12px;--r2:8px;--r3:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

.app{max-width:1200px;margin:0 auto;padding:20px 24px 60px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;flex-wrap:wrap;gap:10px}
.hd h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--pp));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-info{font-size:12px;color:var(--t3)}

.upload-zone{border:2px dashed var(--bd2);border-radius:var(--r);padding:48px 24px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:24px;background:var(--s1)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--ac);background:var(--ac2)}
.upload-zone h3{font-size:16px;margin-bottom:8px;color:var(--t2)}
.upload-zone p{font-size:13px;color:var(--t3)}
.upload-zone input{display:none}

.progress-bar{height:4px;background:var(--s2);border-radius:2px;margin:16px 0;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pp));border-radius:2px;transition:width .3s;width:0}
.progress-text{font-size:12px;color:var(--t3);text-align:center;display:none}

.results{display:none}

.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--s1);border-radius:var(--r);padding:3px;overflow-x:auto;flex-wrap:nowrap}
.tab{flex:none;padding:9px 16px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:var(--r2);font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--t2)}.tab.active{background:var(--ac2);color:var(--ac)}
.tab .cnt{display:inline-block;min-width:18px;text-align:center;font-size:10px;padding:1px 5px;border-radius:8px;margin-left:5px}
.tab .cnt.rd{background:var(--rd2);color:var(--rd)}
.tab .cnt.yl{background:var(--yl2);color:var(--yl)}
.tab .cnt.gn{background:var(--gn2);color:var(--gn)}

.panel{display:none}.panel.active{display:block}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--t1);display:flex;align-items:center;gap:8px}
.card h3 .icon{width:20px;height:20px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:11px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px}
.stat .label{font-size:11px;color:var(--t3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stat .value{font-size:22px;font-weight:700}
.stat .sub{font-size:11px;color:var(--t3);margin-top:2px}
.stat.danger .value{color:var(--rd)}.stat.warn .value{color:var(--yl)}.stat.ok .value{color:var(--gn)}.stat.info .value{color:var(--ac)}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.info-item{display:flex;gap:8px;padding:8px 12px;background:var(--s2);border-radius:var(--r3);font-size:13px}
.info-item .k{color:var(--t3);white-space:nowrap;min-width:80px}
.info-item .v{color:var(--t1);word-break:break-all}

.error-list{max-height:500px;overflow-y:auto}
.error-item{padding:12px 14px;border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;transition:all .2s}
.error-item:hover{border-color:var(--ac);background:var(--s2)}
.error-item .error-header{display:flex;justify-content:space-between;align-items:center;gap:8px}
.error-item .error-msg{font-size:13px;font-weight:500;flex:1}
.error-item .error-count{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.error-item.level-error .error-count{background:var(--rd2);color:var(--rd)}
.error-item.level-warning .error-count{background:var(--yl2);color:var(--yl)}
.error-item.level-info .error-count{background:var(--ac2);color:var(--ac)}
.error-item .error-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);font-size:12px;color:var(--t3);white-space:pre-wrap;font-family:'Cascadia Code','Fira Code',monospace;max-height:200px;overflow-y:auto}
.error-item.open .error-detail{display:block}
.error-item .error-time{font-size:11px;color:var(--t4);margin-top:4px}

.log-viewer{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.7;max-height:600px;overflow:auto;white-space:pre-wrap;word-break:break-all}
.log-viewer .log-e{color:var(--rd)}.log-viewer .log-w{color:var(--yl)}.log-viewer .log-i{color:var(--t2)}.log-viewer .log-d{color:var(--t3)}

.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar input{flex:1;min-width:200px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 12px;color:var(--t1);font-size:13px;outline:none}
.filter-bar input:focus{border-color:var(--ac)}
.filter-bar select{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 12px;color:var(--t1);font-size:13px;outline:none;cursor:pointer}
.filter-bar button{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 14px;color:var(--t2);font-size:12px;cursor:pointer;transition:all .2s}
.filter-bar button:hover{border-color:var(--ac);color:var(--ac)}
.filter-bar button.active{background:var(--ac2);border-color:var(--ac);color:var(--ac)}

.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--bd)}
.tl-item{position:relative;padding:8px 0 8px 16px;font-size:13px}
.tl-item::before{content:'';position:absolute;left:-18px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--s3);border:2px solid var(--bd)}
.tl-item.tl-error::before{background:var(--rd);border-color:var(--rd)}.tl-item.tl-warn::before{background:var(--yl);border-color:var(--yl)}
.tl-item.tl-info::before{background:var(--ac);border-color:var(--ac)}
.tl-item .tl-time{font-size:11px;color:var(--t4)}
.tl-item .tl-msg{color:var(--t2)}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-rd{background:var(--rd2);color:var(--rd)}.badge-yl{background:var(--yl2);color:var(--yl)}
.badge-gn{background:var(--gn2);color:var(--gn)}.badge-ac{background:var(--ac2);color:var(--ac)}
.badge-pp{background:var(--pp2);color:var(--pp)}.badge-og{background:var(--og2);color:var(--og)}

.net-table{width:100%;border-collapse:collapse;font-size:12px}
.net-table th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--bd);color:var(--t3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.net-table td{padding:7px 10px;border-bottom:1px solid var(--s3);color:var(--t2)}
.net-table tr:hover td{background:var(--s2)}

.chart-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.chart-bar .bar-label{font-size:12px;color:var(--t3);min-width:120px;text-align:right}
.chart-bar .bar-track{flex:1;height:22px;background:var(--s3);border-radius:var(--r3);overflow:hidden;position:relative}
.chart-bar .bar-fill{height:100%;border-radius:var(--r3);transition:width .5s}
.chart-bar .bar-value{font-size:11px;color:var(--t3);min-width:50px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}

.section-title{font-size:15px;font-weight:600;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%}

.empty-state{text-align:center;padding:40px;color:var(--t3);font-size:14px}

.tag{display:inline-block;padding:2px 8px;background:var(--s3);border-radius:var(--r3);font-size:11px;color:var(--t2);margin:2px}

.collapsible{cursor:pointer;user-select:none}
.collapsible::before{content:'>';display:inline-block;margin-right:6px;transition:transform .2s;font-size:11px}
.collapsible.open::before{transform:rotate(90deg)}

.bp-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:0;margin-bottom:14px;overflow:hidden}
.bp-card .bp-head{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .2s}
.bp-card .bp-head:hover{background:var(--s2)}
.bp-card .bp-head .bp-icon{width:32px;height:32px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.bp-card .bp-head .bp-title{flex:1}
.bp-card .bp-head .bp-title h4{font-size:14px;font-weight:600;margin-bottom:2px}
.bp-card .bp-head .bp-title p{font-size:11px;color:var(--t3)}
.bp-card .bp-body{padding:0 18px 16px;display:none}
.bp-card.open .bp-body{display:block}
.bp-card .bp-arrow{color:var(--t4);font-size:11px;transition:transform .2s}
.bp-card.open .bp-arrow{transform:rotate(90deg)}

.behav-tl{position:relative;padding-left:28px}
.behav-tl::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--s3)}
.bt-item{position:relative;padding:10px 0;border-bottom:1px solid rgba(46,51,69,.4)}
.bt-item:last-child{border-bottom:none}
.bt-item::before{content:'';position:absolute;left:-22px;top:16px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bd)}
.bt-item.bt-voice::before{background:var(--gn);border-color:var(--gn)}
.bt-item.bt-chat::before{background:var(--ac);border-color:var(--ac)}
.bt-item.bt-ui::before{background:var(--pp);border-color:var(--pp)}
.bt-item.bt-interact::before{background:var(--og);border-color:var(--og)}
.bt-item.bt-system::before{background:var(--cy);border-color:var(--cy)}
.bt-item.bt-error::before{background:var(--rd);border-color:var(--rd)}
.bt-item.bt-perf::before{background:var(--yl);border-color:var(--yl)}
.bt-item .bt-time{font-size:11px;color:var(--t4);font-family:'Cascadia Code','Fira Code',monospace}
.bt-item .bt-desc{font-size:13px;color:var(--t2);margin-top:2px}
.bt-item .bt-detail{font-size:11px;color:var(--t3);margin-top:4px;padding:6px 10px;background:var(--s2);border-radius:var(--r3);font-family:'Cascadia Code','Fira Code',monospace;white-space:pre-wrap;word-break:break-all;display:none;max-height:150px;overflow:auto}
.bt-item.open .bt-detail{display:block}

.diag-item{padding:16px;border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:10px;position:relative;overflow:hidden}
.diag-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.diag-item.sev-critical::before{background:var(--rd)}
.diag-item.sev-warning::before{background:var(--yl)}
.diag-item.sev-info::before{background:var(--ac)}
.diag-item .diag-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.diag-item .diag-head .diag-sev{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.diag-item.sev-critical .diag-sev{background:var(--rd2);color:var(--rd)}
.diag-item.sev-warning .diag-sev{background:var(--yl2);color:var(--yl)}
.diag-item.sev-info .diag-sev{background:var(--ac2);color:var(--ac)}
.diag-item .diag-title{font-size:14px;font-weight:600}
.diag-item .diag-body{font-size:13px;color:var(--t2);line-height:1.8}
.diag-item .diag-body strong{color:var(--t1)}
.diag-item .diag-evidence{margin-top:10px;padding:10px;background:var(--s2);border-radius:var(--r3);font-size:12px;font-family:'Cascadia Code','Fira Code',monospace;color:var(--t3);white-space:pre-wrap;max-height:120px;overflow:auto}
.diag-item .diag-fix{margin-top:10px;padding:10px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:var(--r3);font-size:12px;color:var(--gn)}

.player-card{display:flex;gap:14px;align-items:center;padding:14px;background:var(--s2);border-radius:var(--r2);margin-bottom:14px;flex-wrap:wrap}
.player-card .pc-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--pp));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.player-card .pc-info{flex:1;min-width:150px}
.player-card .pc-info h4{font-size:15px;font-weight:600}
.player-card .pc-info p{font-size:12px;color:var(--t3)}
.player-card .pc-tags{display:flex;flex-wrap:wrap;gap:4px}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <h1>Weelife 日志自动分析工具</h1>
    <div class="hd-info">支持 .zip 日志包自动解析 (logcat / tombstone / xlog)</div>
  </div>

  <div class="upload-zone" id="uploadZone">
    <h3>拖拽日志 ZIP 文件到此处，或点击选择</h3>
    <p>支持嵌套 ZIP 文件自动解包，支持 logcat、tombstone/xcrash、xlog 格式</p>
    <input type="file" id="fileInput" accept=".zip">
  </div>

  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>

  <div class="results" id="results">
    <div class="tabs" id="tabBar"></div>
    <div id="panels"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

class LogAnalyzer {
  constructor() {
    this.files = {};
    this.analysis = {};
    this._behavFilterType = 'all';
    this.setupUpload();
  }

  setupUpload() {
    const zone = $('#uploadZone');
    const input = $('#fileInput');
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      if (e.dataTransfer.files.length) this.processFile(e.dataTransfer.files[0]);
    });
    input.addEventListener('change', () => { if (input.files.length) this.processFile(input.files[0]); });
  }

  setProgress(pct, text) {
    const bar = $('#progressBar'), fill = $('#progressFill'), txt = $('#progressText');
    bar.style.display = 'block'; txt.style.display = 'block';
    fill.style.width = pct + '%'; txt.textContent = text;
  }

  async processFile(file) {
    this.files = {};
    this.analysis = {};
    try {
      this.setProgress(10, '正在解压主 ZIP 文件...');
      const zip = await JSZip.loadAsync(file);
      await this.extractRecursive(zip, '');
      this.setProgress(40, '正在分类日志文件...');
      this.classifyFiles();
      this.setProgress(50, '正在解析 Tombstone/xCrash...');
      this.parseTombstone();
      this.setProgress(65, '正在解析 Logcat (Unity)...');
      this.parseLogcat();
      this.setProgress(75, '正在分析玩家行为路径...');
      this.analyzePlayerBehavior();
      this.setProgress(85, '正在生成问题诊断...');
      this.diagnosePloblems();
      this.setProgress(90, '正在生成分析报告...');
      this.generateReport();
      this.setProgress(100, '分析完成！');
      setTimeout(() => {
        $('#progressBar').style.display = 'none';
        $('#progressText').style.display = 'none';
        $('#results').style.display = 'block';
      }, 500);
    } catch (err) {
      this.setProgress(0, '解析失败: ' + err.message);
      console.error(err);
    }
  }

  async extractRecursive(zip, prefix) {
    for (const [name, entry] of Object.entries(zip.files)) {
      if (entry.dir) continue;
      const fullPath = prefix ? prefix + '/' + name : name;
      if (name.endsWith('.zip')) {
        try {
          const data = await entry.async('arraybuffer');
          const innerZip = await JSZip.loadAsync(data);
          await this.extractRecursive(innerZip, fullPath.replace('.zip', ''));
        } catch (e) {
          console.warn('无法解压内部 zip:', fullPath, e);
        }
      } else {
        try {
          const ext = name.split('.').pop().toLowerCase();
          if (ext === 'xlog') {
            this.files[fullPath] = { type: 'binary', size: entry._data?.uncompressedSize || 0, name };
          } else {
            const text = await entry.async('string');
            this.files[fullPath] = { type: 'text', content: text, name, size: text.length };
          }
        } catch (e) {
          this.files[fullPath] = { type: 'binary', size: 0, name };
        }
      }
    }
  }

  classifyFiles() {
    this.classified = { tombstone: [], logcat: [], xlog: [], unknown: [] };
    for (const [path, file] of Object.entries(this.files)) {
      if (file.type === 'binary' && file.name.includes('xlog')) {
        this.classified.xlog.push({ path, ...file });
      } else if (file.type === 'text' && (file.name.includes('tombstone') || file.name.includes('xcrash') || file.name.includes('.trace'))) {
        this.classified.tombstone.push({ path, ...file });
      } else if (file.type === 'text' && (file.name.startsWith('log_') || file.name.includes('logcat'))) {
        this.classified.logcat.push({ path, ...file });
      } else if (file.type === 'text') {
        const content = file.content.substring(0, 500);
        if (content.includes('Tombstone maker') || content.includes('xCrash') || content.includes('Crash type')) {
          this.classified.tombstone.push({ path, ...file });
        } else if (content.includes('logger Start') || content.includes('Unity') || content.includes('[LogProxy]') || content.includes('[NetWork]')) {
          this.classified.logcat.push({ path, ...file });
        } else {
          this.classified.unknown.push({ path, ...file });
        }
      }
    }
  }

  parseTombstone() {
    this.analysis.tombstones = [];
    for (const file of this.classified.tombstone) {
      const t = this.parseSingleTombstone(file.content);
      t.fileName = file.name;
      this.analysis.tombstones.push(t);
    }
  }

  parseSingleTombstone(text) {
    const r = {};
    const m = (pat) => { const match = text.match(pat); return match ? match[1].trim() : ''; };
    r.crashType = m(/Crash type:\s*'([^']+)'/);
    r.startTime = m(/Start time:\s*'([^']+)'/);
    r.crashTime = m(/Crash time:\s*'([^']+)'/);
    r.appId = m(/App ID:\s*'([^']+)'/);
    r.appVersion = m(/App version:\s*'([^']+)'/);
    r.apiLevel = m(/API level:\s*'([^']+)'/);
    r.osVersion = m(/OS version:\s*'([^']+)'/);
    r.manufacturer = m(/Manufacturer:\s*'([^']+)'/);
    r.brand = m(/Brand:\s*'([^']+)'/);
    r.model = m(/Model:\s*'([^']+)'/);
    r.abi = m(/ABI:\s*'([^']+)'/);
    r.rooted = m(/Rooted:\s*'([^']+)'/);
    r.kernel = m(/Kernel version:\s*'([^']+)'/);
    r.pid = m(/pid:\s*(\d+)/);
    r.buildFingerprint = m(/Build fingerprint:\s*'([^']+)'/);
    r.foreground = m(/foreground:\s*(\w+)/);

    const memMatch = text.match(/MemTotal:\s+(\d+)\s+kB[\s\S]*?MemFree:\s+(\d+)\s+kB[\s\S]*?MemAvailable:\s+(\d+)\s+kB/);
    if (memMatch) {
      r.memTotal = parseInt(memMatch[1]);
      r.memFree = parseInt(memMatch[2]);
      r.memAvailable = parseInt(memMatch[3]);
    }
    const swapMatch = text.match(/SwapTotal:\s+(\d+)\s+kB[\s\S]*?SwapFree:\s+(\d+)\s+kB/);
    if (swapMatch) {
      r.swapTotal = parseInt(swapMatch[1]);
      r.swapFree = parseInt(swapMatch[2]);
    }
    const vmRss = text.match(/VmRSS:\s+(\d+)\s+kB/);
    if (vmRss) r.vmRss = parseInt(vmRss[1]);
    const threads = text.match(/Threads:\s+(\d+)/);
    if (threads) r.threads = parseInt(threads[1]);
    const fdMatch = text.match(/\(number of FDs:\s*(\d+)\)/);
    if (fdMatch) r.fdCount = parseInt(fdMatch[1]);

    const javaHeap = text.match(/Java Heap:\s+(\d+)/);
    const nativeHeap = text.match(/Native Heap:\s+(\d+)/);
    const graphics = text.match(/Graphics:\s+(\d+)/);
    const totalPss = text.match(/TOTAL:\s+(\d+)\s+TOTAL SWAP:/);
    if (javaHeap) r.javaHeap = parseInt(javaHeap[1]);
    if (nativeHeap) r.nativeHeap = parseInt(nativeHeap[1]);
    if (graphics) r.graphics = parseInt(graphics[1]);
    if (totalPss) r.totalPss = parseInt(totalPss[1]);

    const logcatSection = text.match(/logcat:\n([\s\S]*?)(?=\n\+\+\+|\n---\s*---|\nopen files:)/);
    if (logcatSection) {
      r.logcatSnippet = logcatSection[1].substring(0, 3000);
    }

    const warnings = [];
    const audioExceptions = text.match(/\[W\].*?exception.*$/gm);
    if (audioExceptions) warnings.push(...audioExceptions.map(w => w.substring(0, 200)));
    r.warnings = warnings;

    return r;
  }

  parseLogcat() {
    this.analysis.logcat = { entries: [], errors: {}, warnings: {}, networkEvents: [], categories: {}, timeline: [] };
    for (const file of this.classified.logcat) {
      this.parseSingleLogcat(file.content, file.name);
    }
  }

  parseSingleLogcat(text, fileName) {
    const a = this.analysis.logcat;
    const lines = text.split('\n');
    let currentTime = '';
    let currentBlock = [];
    let lineNum = 0;
    const errorMap = {};
    const warnMap = {};
    const catCount = {};

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const timeMatch = line.match(/^(\d{4}:\d{2}:\d{2}\s+\d{2}:\d{2}:\d{2}:\d{3})$/);
      if (timeMatch) {
        if (currentBlock.length > 0) {
          this.processLogBlock(currentTime, currentBlock, a, errorMap, warnMap, catCount);
        }
        currentTime = timeMatch[1];
        currentBlock = [];
        continue;
      }
      if (line.trim()) currentBlock.push(line);
    }
    if (currentBlock.length > 0) {
      this.processLogBlock(currentTime, currentBlock, a, errorMap, warnMap, catCount);
    }

    for (const [msg, data] of Object.entries(errorMap)) {
      if (!a.errors[msg]) a.errors[msg] = { count: 0, times: [], detail: '' };
      a.errors[msg].count += data.count;
      a.errors[msg].times.push(...data.times);
      if (!a.errors[msg].detail) a.errors[msg].detail = data.detail;
    }
    for (const [msg, data] of Object.entries(warnMap)) {
      if (!a.warnings[msg]) a.warnings[msg] = { count: 0, times: [] };
      a.warnings[msg].count += data.count;
      a.warnings[msg].times.push(...data.times);
    }
    for (const [cat, cnt] of Object.entries(catCount)) {
      a.categories[cat] = (a.categories[cat] || 0) + cnt;
    }
  }

  processLogBlock(time, block, analysis, errorMap, warnMap, catCount) {
    const firstLine = block[0] || '';
    const fullBlock = block.join('\n');

    const catMatch = firstLine.match(/^\[(\w+)\]/);
    const category = catMatch ? catMatch[1] : 'General';
    catCount[category] = (catCount[category] || 0) + 1;

    if (firstLine.includes('转换失败') || firstLine.includes('Exception') || firstLine.includes('Error') ||
        firstLine.includes('NullReference') || firstLine.includes('error') || firstLine.includes('失败')) {
      const key = firstLine.replace(/uid\s*=\s*\d+/g, 'uid=*').replace(/\d{10,}/g, '*').substring(0, 120);
      if (!errorMap[key]) errorMap[key] = { count: 0, times: [], detail: '' };
      errorMap[key].count++;
      errorMap[key].times.push(time);
      if (!errorMap[key].detail) errorMap[key].detail = fullBlock.substring(0, 500);
    }

    if (firstLine.includes('Setting linear velocity') || firstLine.includes('WARNING') || firstLine.includes('warning')) {
      const key = firstLine.substring(0, 80);
      if (!warnMap[key]) warnMap[key] = { count: 0, times: [] };
      warnMap[key].count++;
      warnMap[key].times.push(time);
    }

    if (firstLine.includes('[NetWork]')) {
      const dirMatch = firstLine.match(/(cs send|ReceiveData)/);
      const direction = dirMatch ? (dirMatch[1].includes('send') ? 'SEND' : 'RECV') : 'UNKNOWN';
      const msgIdMatch = fullBlock.match(/MsgId:(\d+).*?,(\w+)/);
      const protoMatch = fullBlock.match(/MsgId:\d+,.*?,(\S+)/);
      if (msgIdMatch) {
        analysis.networkEvents.push({
          time,
          direction,
          msgId: msgIdMatch[1],
          name: protoMatch ? protoMatch[1] : '',
          snippet: fullBlock.substring(0, 300)
        });
      }
    }

    if (firstLine.includes('[TrackEvent]')) {
      try {
        const jsonMatch = firstLine.match(/\{[\s\S]+\}/);
        if (jsonMatch) {
          const evt = JSON.parse(jsonMatch[0]);
          analysis.timeline.push({ time, type: 'track', event: evt.data?.eventId || 'unknown', detail: JSON.stringify(evt.data?.extraInfo || {}) });
        }
      } catch (e) {}
    }

    analysis.entries.push({ time, category, firstLine: firstLine.substring(0, 300), level: this.guessLevel(firstLine) });
  }

  guessLevel(line) {
    if (line.includes('Error') || line.includes('error') || line.includes('Exception') ||
        line.includes('失败') || line.includes('FATAL')) return 'error';
    if (line.includes('Warning') || line.includes('warning') || line.includes('WARNING') ||
        line.includes('Setting linear velocity')) return 'warning';
    return 'info';
  }

  analyzePlayerBehavior() {
    const b = { playerUid:'', roomId:'', roomSysId:'', sceneId:'', roomOwner:'', players:{}, allActions:[], voiceStats:{talkCount:0,endCount:0,uids:{}}, fps:[], chatMsgs:[], inputTexts:[], perfData:null, deviceInfo:null };
    const a = this.analysis.logcat;
    if (!a) { this.analysis.behavior = b; return; }
    const full = this.classified.logcat[0]?.content || '';
    const devMatch = full.match(/deviceModel[：:]([^\n,]+)/);
    const memMatch = full.match(/memorySize:(\d+)/);
    const gpuMatch = full.match(/graphicsDeviceName[：:]([^\n,]+)/);
    const cpuMatch = full.match(/processorType[：:]([^\n,]+)/);
    const osMatch = full.match(/operatingSystem[：:]([^\n,]+)/);
    b.deviceInfo = { model:(devMatch?.[1]||'').trim(), mem:(memMatch?.[1]||''), gpu:(gpuMatch?.[1]||'').trim(), cpu:(cpuMatch?.[1]||'').trim(), os:(osMatch?.[1]||'').trim() };

    let physWarnBatch = null;
    let audioErrBatch = null;

    const flushPhysBatch = (time) => {
      if (physWarnBatch) {
        b.allActions.push({time:physWarnBatch.startTime,type:'error',cls:'bt-error',desc:`⚡ 物理引擎警告连续爆发 ×${physWarnBatch.count} 次 (${physWarnBatch.startTime} ~ ${time})`,detail:`Setting linear velocity of a kinematic body is not supported.\n从 ${physWarnBatch.startTime} 到 ${time}，共 ${physWarnBatch.count} 次\n来源: PhysicCharacter.FixedUpdate() → Rigidbody.set_velocity()`});
        physWarnBatch = null;
      }
    };
    const flushAudioErrBatch = (time) => {
      if (audioErrBatch) {
        b.allActions.push({time:audioErrBatch.startTime,type:'error',cls:'bt-error',desc:`🔇 音效日志转换失败 连续 ×${audioErrBatch.count} 次 (uid: ${[...audioErrBatch.uids].join(', ')})`,detail:`${audioErrBatch.startTime} ~ ${time}，共 ${audioErrBatch.count} 次失败`});
        audioErrBatch = null;
      }
    };

    for (const entry of a.entries) {
      const t = entry.time, fl = entry.firstLine;
      const shortTime = t?.split(' ')[1] || t || '';

      // voice start
      const talkMatch = fl.match(/用户(\d+)在房间说话[，,].*?音量(\d+)/);
      if (talkMatch) {
        flushPhysBatch(shortTime); flushAudioErrBatch(shortTime);
        b.playerUid = b.playerUid || talkMatch[1];
        b.voiceStats.talkCount++;
        b.voiceStats.uids[talkMatch[1]] = (b.voiceStats.uids[talkMatch[1]]||0)+1;
        b.allActions.push({time:shortTime,type:'voice',cls:'bt-voice',desc:`🎙️ 用户 ${talkMatch[1]} 开始说话 (音量 ${talkMatch[2]})`,uid:talkMatch[1]});
        continue;
      }
      // voice end
      const talkEnd = fl.match(/用户(\d+)在房间说话结束/);
      if (talkEnd) {
        b.voiceStats.endCount++;
        b.allActions.push({time:shortTime,type:'voice',cls:'bt-voice',desc:`🔇 用户 ${talkEnd[1]} 停止说话`,uid:talkEnd[1]});
        continue;
      }

      // audio sync events (track count, don't flood timeline)
      if (fl.includes('CS_SyncAudioStatusReq')) {
        b._audioSyncReqCount = (b._audioSyncReqCount||0)+1;
        continue;
      }
      if (fl.includes('SC_SyncAudioStatusPush') || fl.includes('ChatModuleProxy:SyncAudioStatusPush')) {
        b._audioSyncPushCount = (b._audioSyncPushCount||0)+1;
        continue;
      }

      // member audio packet (track per-uid, batch for timeline)
      if (fl.includes('有成员发送音频包')) {
        const uidM = fl.match(/openIdList=(\d+)/);
        if (uidM) {
          b.players[uidM[1]] = b.players[uidM[1]] || {uid:uidM[1],voiceCount:0};
          b.players[uidM[1]].voiceCount++;
          b._memberAudioCount = (b._memberAudioCount||0)+1;
        }
        continue;
      }

      // perf
      const perfMatch = fl.match(/room_statistics_performance/);
      if (perfMatch) {
        flushPhysBatch(shortTime); flushAudioErrBatch(shortTime);
        const fp = fl.match(/fps=(\d+)/), qu = fl.match(/quality=(\d+)/), pe = fl.match(/people=(\d+)/);
        const rm = fl.match(/room_alias_id="(\d+)"/), sr = fl.match(/sys_room_id="(\d+)"/);
        const sc = fl.match(/room_map_scene_id="(\w+)"/), ow = fl.match(/room_owner_uid="(\d+)"/);
        if (rm) b.roomId = rm[1]; if (sr) b.roomSysId = sr[1]; if (sc) b.sceneId = sc[1]; if (ow) b.roomOwner = ow[1];
        const fpsVal = fp ? parseInt(fp[1]) : 0;
        b.fps.push(fpsVal);
        b.perfData = { fps:fpsVal, quality:qu?qu[1]:'?', people:pe?pe[1]:'?' };
        b.allActions.push({time:shortTime,type:'perf',cls:'bt-perf',desc:`📊 性能埋点: FPS=${fpsVal}, 画质=${qu?qu[1]:'?'}, 房间人数=${pe?pe[1]:'?'}`,detail:`scene=${sc?sc[1]:'?'}, room=${rm?rm[1]:'?'}, owner=${ow?ow[1]:'?'}`});
        continue;
      }

      // clock tick
      if (fl.includes('ClockTickPush')) {
        b.allActions.push({time:shortTime,type:'system',cls:'bt-system',desc:'⏰ 服务器心跳 (ClockTickPush)'});
        continue;
      }
      // server time
      if (fl.includes('CS_ServerTimeReq')) {
        b.allActions.push({time:shortTime,type:'network',cls:'bt-system',desc:'📡 请求服务器时间 (CS_ServerTimeReq)'});
        continue;
      }
      if (fl.includes('RE_ServerTimeRsp')) {
        b.allActions.push({time:shortTime,type:'network',cls:'bt-system',desc:'📡 收到服务器时间响应 (RE_ServerTimeRsp)'});
        continue;
      }

      // announce
      if (fl.includes('proto.AnnouncePush') || fl.includes('AnnouncePush')) {
        b.allActions.push({time:shortTime,type:'system',cls:'bt-system',desc:'📢 收到系统公告推送 (AnnouncePush)'});
        continue;
      }

      // module open/show
      const showMod = fl.match(/EVENT_SHOWMODULE\s+ui:(\S+)/);
      if (showMod) {
        flushPhysBatch(shortTime); flushAudioErrBatch(shortTime);
        const mn = showMod[1].replace(/\$\$\d+/g,'');
        const mnLabel = this.translateModuleName(mn);
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:`📱 打开界面: ${mnLabel}`,module:mn,detail:`原始名: ${showMod[1]}`});
        continue;
      }
      // module close
      const closeMod = fl.match(/CLOSE_MODULE\s+ui:(\S+)/);
      if (closeMod) {
        flushPhysBatch(shortTime); flushAudioErrBatch(shortTime);
        const mn = closeMod[1].replace(/\$\$\d+/g,'');
        const mnLabel = this.translateModuleName(mn);
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:`❌ 关闭界面: ${mnLabel}`,module:mn});
        continue;
      }
      // module exit show
      const exitMod = fl.match(/EXIT_SHOWMODULE\s+ui:(\S+)/);
      if (exitMod) {
        const mn = exitMod[1].replace(/\$\$\d+/g,'');
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:`🔙 退出界面显示: ${this.translateModuleName(mn)}`});
        continue;
      }

      // MeteorWish
      if (fl.includes('MeteorWishProxy') && fl.includes('OpenWindow')) {
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:'🌠 打开流星许愿弹窗'});
        continue;
      }

      // keyboard show
      if (fl.includes('onKeyPadShow') || (fl.includes('KeyPadHandler') && fl.includes('displayKeyPad'))) {
        b.allActions.push({time:shortTime,type:'chat',cls:'bt-chat',desc:'⌨️ 调起输入键盘'});
        continue;
      }
      // keyboard input (track internally, only show final text)
      const kbMatch = fl.match(/inputText":"([^"]*)"/);
      if (kbMatch && fl.includes('onInputTextChanged')) {
        b._lastInputText = kbMatch[1];
        b._lastInputTime = shortTime;
        continue;
      }
      // keyboard dismiss → emit one action with final text
      if (fl.includes('dismissKeyPad')) {
        if (b._lastInputText) {
          b.allActions.push({time:b._lastInputTime||shortTime,type:'chat',cls:'bt-chat',desc:`✏️ 输入完成: "${b._lastInputText}"`});
        }
        b.allActions.push({time:shortTime,type:'chat',cls:'bt-chat',desc:`⌨️ 关闭键盘`});
        b._lastInputText = ''; b._lastInputTime = '';
        continue;
      }

      // chat message sent
      const sendMsg = fl.match(/SendMessageToRoom:(.+)/);
      if (sendMsg) {
        const content = sendMsg[1].trim();
        b.allActions.push({time:shortTime,type:'chat',cls:'bt-chat',desc:`💬 发送聊天消息到房间: "${content}"`,detail:content});
        b.chatMsgs.push({time:shortTime, content});
        continue;
      }
      if (fl.includes('RCIM_SDK ShowUI Message')) {
        b.allActions.push({time:shortTime,type:'chat',cls:'bt-chat',desc:'💬 IM SDK 显示消息 UI'});
        continue;
      }
      if (fl.includes('ChatData:AddChatMessage')) {
        b.allActions.push({time:shortTime,type:'chat',cls:'bt-chat',desc:'💬 聊天消息入库并显示在界面'});
        continue;
      }

      // kick list
      if (fl.includes('CS_RoomKickListReq')) {
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:'👢 请求踢人列表 (CS_RoomKickListReq)'});
        continue;
      }
      if (fl.includes('RoomKickListRsp')) {
        b.allActions.push({time:shortTime,type:'ui',cls:'bt-ui',desc:'👢 收到踢人列表响应 (RoomKickListRsp)',detail:fl.substring(0,200)});
        continue;
      }
      const kickName = fl.match(/nickName\s*:\s*(.+)/);
      if (kickName && !fl.includes('icon') && fl.includes('Rsp')) {
        b.allActions.push({time:shortTime,type:'system',cls:'bt-system',desc:`👤 踢人列表成员: ${kickName[1].trim()}`});
        continue;
      }

      // expression/animation play
      const exprMatch = fl.match(/Play Expression.*?actionName=(\S+)/);
      if (exprMatch) {
        b.allActions.push({time:shortTime,type:'interact',cls:'bt-interact',desc:`🎭 播放表情/动作: ${exprMatch[1]}`});
        continue;
      }

      // interaction data
      const interData = fl.match(/data_id":"([^"]+).*?initiator_id":(\d+).*?passive_id":(\d+)/);
      if (interData) {
        b.allActions.push({time:shortTime,type:'interact',cls:'bt-interact',desc:`🤝 互动数据: ${interData[1]} (发起人 ${interData[2]} → 接受者 ${interData[3]})`,detail:fl.substring(0,300)});
        continue;
      }

      // interaction system stop
      if (fl.includes('InteractionSystem:StopInteraction') || fl.includes('StopMultiTarget')) {
        b.allActions.push({time:shortTime,type:'interact',cls:'bt-interact',desc:'🛑 停止多人互动 (StopInteraction)'});
        continue;
      }
      if (fl.includes('ExitInteractState')) {
        b.allActions.push({time:shortTime,type:'interact',cls:'bt-interact',desc:'🚪 退出互动状态 (ExitInteractState)'});
        continue;
      }

      // gift effect (batch)
      if (fl.includes('GiftEffectMediator')) {
        b._giftEffectCount = (b._giftEffectCount||0)+1;
        if (!b._giftEffectFirstTime) b._giftEffectFirstTime = shortTime;
        b._giftEffectLastTime = shortTime;
        continue;
      }

      // asset loading
      const assetLoad = fl.match(/ABLoadAsset cost:([\d.]+),.*?asset:(\S+)/);
      if (assetLoad) {
        b.allActions.push({time:shortTime,type:'system',cls:'bt-system',desc:`📦 加载资源: ${assetLoad[2]} (耗时 ${assetLoad[1]}ms)`});
        continue;
      }

      // image loading
      const imgLoad = fl.match(/ImageLoadManager.*?StartLoad.*?(https?:\S+)/);
      if (imgLoad) {
        const shortUrl = imgLoad[1].split('/').pop().split('?')[0];
        b.allActions.push({time:shortTime,type:'system',cls:'bt-system',desc:`🖼️ 加载网络图片: ${shortUrl}`});
        continue;
      }

      // audio conversion fail (batch)
      if (fl.includes('音效日志转换失败')) {
        const uid = fl.match(/uid\s*=\s*(\d+)/);
        if (!audioErrBatch) audioErrBatch = {startTime:shortTime,count:0,uids:new Set()};
        audioErrBatch.count++;
        if (uid) audioErrBatch.uids.add(uid[1]);
        continue;
      }

      // dotween error
      if (fl.includes('Tween has been killed')) {
        b.allActions.push({time:shortTime,type:'error',cls:'bt-error',desc:'⚠️ DOTween 动画被提前销毁 (Tween has been killed)'});
        continue;
      }

      // physics warning (batch)
      if (fl.includes('Setting linear velocity')) {
        if (!physWarnBatch) physWarnBatch = {startTime:shortTime,count:0};
        physWarnBatch.count++;
        continue;
      }

      // other players
      const playerSeen = fl.match(/playerId\s*:\s*(\d+)/);
      if (playerSeen) { b.players[playerSeen[1]] = b.players[playerSeen[1]]||{uid:playerSeen[1],voiceCount:0}; }
      const playerSeen2 = fl.match(/playerId:(\d+)/);
      if (playerSeen2) { b.players[playerSeen2[1]] = b.players[playerSeen2[1]]||{uid:playerSeen2[1],voiceCount:0}; }

      // generic network with protocol name
      const netProto = fl.match(/MsgId:(\d+),.*?,(\w+),/);
      if (netProto && !fl.includes('SyncAudioStatus') && !fl.includes('ServerTime')) {
        b.allActions.push({time:shortTime,type:'network',cls:'bt-system',desc:`📡 网络请求: ${netProto[2]} (MsgId:${netProto[1]})`});
        continue;
      }
      const netPush = fl.match(/MsgId:\d+,.*?,(\w+\.\w+)/);
      if (netPush && !fl.includes('SyncAudioStatus') && !fl.includes('ClockTick') && !fl.includes('ServerTime') && !fl.includes('Announce')) {
        b.allActions.push({time:shortTime,type:'network',cls:'bt-system',desc:`📡 收到推送: ${netPush[1]}`});
        continue;
      }
    }

    b._physWarnCount = physWarnBatch?.count || 0;
    b._physWarnStart = physWarnBatch?.startTime || '';
    b._audioErrCount = audioErrBatch?.count || 0;
    b._audioSyncReqCount = b._audioSyncReqCount || 0;
    b._audioSyncPushCount = b._audioSyncPushCount || 0;
    flushPhysBatch('END'); flushAudioErrBatch('END');

    if (b._memberAudioCount > 0) {
      const uidSummary = Object.values(b.players).filter(p=>p.voiceCount>0).map(p=>`${p.uid}×${p.voiceCount}`).join(', ');
      b.allActions.push({time:'--:--',type:'voice',cls:'bt-voice',desc:`🔊 收到成员音频包 共 ${b._memberAudioCount} 次 (${uidSummary})`});
    }
    if (b._giftEffectCount > 0) {
      b.allActions.push({time:b._giftEffectFirstTime,type:'system',cls:'bt-system',desc:`🎁 礼物特效系统触发 共 ${b._giftEffectCount} 次 (${b._giftEffectFirstTime} ~ ${b._giftEffectLastTime})`});
    }
    if (b._audioSyncReqCount > 0) {
      b.allActions.push({time:'--:--',type:'network',cls:'bt-system',desc:`📡 音频状态同步请求 (CS_SyncAudioStatusReq) 共 ${b._audioSyncReqCount} 次`,detail:'高频音频状态同步，已合并显示'});
    }
    if (b._audioSyncPushCount > 0) {
      b.allActions.push({time:'--:--',type:'network',cls:'bt-system',desc:`📡 音频状态推送回调 (SC_SyncAudioStatusPush) 共 ${b._audioSyncPushCount} 次`,detail:'服务器推送+客户端处理，已合并显示'});
    }

    b.allActions.sort((x,y) => (x.time||'').localeCompare(y.time||''));
    if (b.roomOwner) delete b.players[b.roomOwner];
    if (b.playerUid) delete b.players[b.playerUid];
    this.analysis.behavior = b;
  }

  translateModuleName(mn) {
    const map = {
      'MeteorWishNotify':'流星许愿通知','RoomHomeOtherModule':'他人主页','MultiplayerInteractionView':'多人互动选择界面',
      'SocialActionView':'社交动作选择界面','ProfileModule':'个人资料','ChatModule':'聊天模块',
      'SettingsModule':'设置','ShopModule':'商城','MailModule':'邮箱','FriendModule':'好友',
      'BagModule':'背包','DressModule':'换装','TaskModule':'任务','RankModule':'排行榜',
      'GiftModule':'礼物','PhotoModule':'拍照','CameraModule':'相机'
    };
    return map[mn] || mn;
  }

  diagnosePloblems() {
    const diags = [];
    const b = this.analysis.behavior || {};
    const a = this.analysis.logcat || {};
    const t = this.analysis.tombstones?.[0];

    // P1: Audio conversion failure
    const audioErr = Object.entries(a.errors||{}).find(([k])=>k.includes('音效日志转换失败'));
    if (audioErr) {
      const [msg,data] = audioErr;
      const uids = new Set();
      (data.detail||'').replace(/uid\s*=\s*(\d+)/g,(_,u)=>uids.add(u));
      diags.push({
        severity:'critical', title:'音效日志转换持续失败',
        body:`在整个日志期间内，共出现 <strong>${data.count} 次</strong>"音效日志转换失败"错误，涉及 uid: ${[...uids].join(', ')||'多个'}。\n\n`+
        `<strong>触发路径分析：</strong>\n`+
        `1. 收到他人音频推送时：SyncAudioStatusPush → ChatRoomDelegate.onEvent → 转换失败\n`+
        `2. 自己开麦时：KtvEventAction → ChatRoomDelegate.onEvent → 转换失败\n\n`+
        `每次语音状态变化都会触发两条相同错误（双重回调），说明 ChatRoomDelegate 在初始化时注册的回调 (b__2) 内部做 uid→音效配置的映射转换逻辑存在缺陷。\n\n`+
        `<strong>影响：</strong>房间内所有人的语音说话音效反馈（音浪动画/声纹特效）可能无法正常显示，直接影响实时语音社交体验。`,
        evidence: data.detail,
        fix:'检查 ChatRoomDelegate 初始化回调 <Init>b__2 中的 uid 到音效配置映射逻辑，确认 uid 是否正确注册到了映射表中。特别关注 ForeachEventAction 中双重触发的原因。'
      });
    }

    // P2: Physics warning flood
    if (b._physWarnCount > 50) {
      diags.push({
        severity:'critical', title:'物理引擎警告洪水导致性能恶化',
        body:`从 ${b._physWarnStart||'?'} 开始，"Setting linear velocity of a kinematic body is not supported" 警告爆发式输出，共计 <strong>${b._physWarnCount} 次</strong>。\n\n`+
        `<strong>触发路径：</strong>PhysicCharacter.FixedUpdate() → FightCharacter.FixedUpdate() → Rigidbody.set_velocity()\n\n`+
        `在 Unity 中，对 isKinematic=true 的 Rigidbody 调用 set_velocity 会触发此警告。由于在 FixedUpdate 中执行，当帧率下降时 Unity 会在一帧内追赶多个 FixedUpdate，导致警告以约 25ms 间隔密集输出。\n\n`+
        `<strong>影响：</strong>每条警告需要格式化字符串 + 调用栈 + 写 LogCallback，在主线程上产生大量 GC 和 CPU 开销。在帧率已经偏低的设备上，会导致画面明显卡顿。`,
        evidence: `PhysicCharacter:FixedUpdate()\nFightCharacter:FixedUpdate()\nUnityEngine.Rigidbody:set_velocity(Vector3)`,
        fix:'在 FightCharacter.FixedUpdate() 中设置 velocity 前，先检查 Rigidbody.isKinematic 状态，如果为 true 则跳过 set_velocity 调用。'
      });
    }

    // P3: Low FPS
    if (b.fps.length) {
      const avgFps = b.fps.reduce((s,f)=>s+f,0)/b.fps.length;
      if (avgFps < 30) {
        diags.push({
          severity:'warning', title:'帧率偏低',
          body:`性能埋点显示平均帧率为 <strong>${avgFps.toFixed(0)} fps</strong>（采样 ${b.fps.length} 次），房间仅 ${b.perfData?.people||'?'} 人。\n\n`+
          `设备为 ${b.deviceInfo?.model||'?'}（${b.deviceInfo?.mem||'?'}MB 内存, ${b.deviceInfo?.gpu||'?'}），属于中端设备，理应有更好的帧率表现。\n\n`+
          `<strong>影响：</strong>用户体验卡顿，结合物理警告洪水和音频线程延迟，可能导致 ANR。`,
          fix:'关注房间场景 '+( b.sceneId||'?')+' 的资源负载，优化中低端设备的渲染/内存策略。'
        });
      }
    }

    // P4: ANR from tombstone
    if (t && t.crashType === 'anr') {
      const dur = this.calcDuration(t.startTime, t.crashTime);
      let memInfo = '';
      if (t.memTotal) {
        const pct = (((t.memTotal-t.memAvailable)/t.memTotal)*100).toFixed(1);
        memInfo = `系统内存占用 ${pct}%，进程 RSS ${t.vmRss?(t.vmRss/1024).toFixed(0):'?'}MB，FD 数 ${t.fdCount||'?'}。`;
      }
      diags.push({
        severity:'critical', title:'ANR (应用无响应) 记录',
        body:`设备 ${t.manufacturer} ${t.model} 上发生过 ANR，持续时间 <strong>${dur}</strong>。\n\n`+
        `${memInfo}\n\n`+
        `Tombstone 中的音频线程日志显示 liteav_audio_api 出现任务延迟异常，最大延迟达 1942ms，说明音频 IO 线程被严重阻塞。\n\n`+
        `<strong>关联分析：</strong>同一设备上的当前 logcat 日志中，物理警告洪水 + 音效转换失败 + 帧率仅 29fps 的组合，与 ANR 的根因高度相关——主线程负载过重，间接影响了音频线程的调度。`,
        evidence: `Crash type: '${t.crashType}'\nStart time: '${t.startTime}'\nCrash time: '${t.crashTime}'\nThreads: ${t.threads}\nFD count: ${t.fdCount}`,
        fix:'优化主线程负载：1) 修复 kinematic body 的 velocity 调用；2) 降低日志输出频率；3) 关注中端设备内存压力。'
      });
    }

    // P5: DOTween
    const tweenErr = a.entries?.filter(e=>e.firstLine.includes('Tween has been killed'));
    if (tweenErr?.length) {
      diags.push({
        severity:'info', title:'DOTween 动画竞态条件',
        body:`出现 ${tweenErr.length} 次 "This Tween has been killed and is now invalid" 错误。\n\n`+
        `发生在 UI 模块隐藏动画 (_playHideEffectAsync) 调用 IsPlaying() 时，Tween 已被其他逻辑 Kill。属于 UI 快速关闭时的异步动画与模块销毁的竞态条件。\n\n`+
        `<strong>影响：</strong>可能导致 UI 关闭时闪烁或动画异常，不致命但影响体验。`,
        fix:'在 _playHideEffectAsync 中增加 Tween 有效性检查（判空 + isActive），或在 CloseModule 时先取消隐藏动画协程。'
      });
    }

    // P6: Repeated audio sync flood
    const syncCount = b._audioSyncReqCount || a.networkEvents?.filter(e=>e.name?.includes('CS_SyncAudioStatusReq')).length || 0;
    if (syncCount > 50) {
      diags.push({
        severity:'warning', title:'音频状态同步请求频率过高',
        body:`在日志期间内，CS_SyncAudioStatusReq 共发送了 <strong>${syncCount} 次</strong>，平均每秒超过 1 次。\n\n`+
        `该请求在 KtvSdkManager.CapturedSoundLevelUpdate() 中由每帧的音量检测触发，频繁的 audio:True/False 切换说明麦克风灵敏度阈值可能过低，导致频繁的开关麦状态切换。\n\n`+
        `<strong>影响：</strong>增加网络开销和服务器压力，同时每次切换都触发 "音效日志转换失败" 错误。`,
        fix:'考虑增加音频状态同步的防抖机制（如 500ms 内不重复发送），或调整麦克风音量检测阈值。'
      });
    }

    this.analysis.diagnostics = diags;
  }

  renderBehavior() {
    const b = this.analysis.behavior;
    if (!b || !b.allActions.length) return '<div class="empty-state">未提取到玩家行为数据</div>';

    let html = '';
    const uid = b.playerUid || b.roomOwner || '?';
    const initial = uid.substring(uid.length-2);
    const otherPlayers = Object.values(b.players).filter(p=>p.uid!==uid);

    // player info card
    html += `<div class="player-card">
      <div class="pc-avatar">${this.esc(initial)}</div>
      <div class="pc-info"><h4>玩家 ${this.esc(uid)} ${b.roomOwner===uid?'(房主)':''}</h4>
        <p>${this.esc(b.deviceInfo?.model||'未知设备')} · ${b.deviceInfo?.mem||'?'}MB · ${this.esc(b.deviceInfo?.gpu||'')}</p></div>
      <div class="pc-tags">
        ${b.roomId?`<span class="tag">房间 ${b.roomId}</span>`:''}
        ${b.sceneId?`<span class="tag">场景 ${b.sceneId}</span>`:''}
        ${b.perfData?`<span class="tag" style="color:${parseInt(b.perfData.fps)<30?'var(--yl)':'var(--gn)'}">${b.perfData.fps} FPS</span>`:''}
        ${otherPlayers.length?`<span class="tag">同房 ${otherPlayers.length+1} 人</span>`:''}
        ${b.chatMsgs.length?`<span class="tag">发言 ${b.chatMsgs.length} 条</span>`:''}
      </div>
    </div>`;

    // stats
    const countByType = {};
    b.allActions.forEach(a=>{countByType[a.type]=(countByType[a.type]||0)+1;});
    html += `<div class="stats">
      <div class="stat ok"><div class="label">语音事件</div><div class="value">${countByType.voice||0}</div><div class="sub">开麦 ${b.voiceStats.talkCount} 次</div></div>
      <div class="stat info"><div class="label">聊天事件</div><div class="value">${countByType.chat||0}</div><div class="sub">发言 ${b.chatMsgs.length} 条</div></div>
      <div class="stat info"><div class="label">界面操作</div><div class="value">${countByType.ui||0}</div></div>
      <div class="stat info"><div class="label">互动事件</div><div class="value">${countByType.interact||0}</div></div>
      <div class="stat info"><div class="label">网络/系统</div><div class="value">${(countByType.network||0)+(countByType.system||0)}</div></div>
      <div class="stat ${countByType.error?'danger':'ok'}"><div class="label">异常事件</div><div class="value">${countByType.error||0}</div></div>
      <div class="stat info"><div class="label">性能采集</div><div class="value">${countByType.perf||0}</div><div class="sub">均帧 ${b.fps.length?(b.fps.reduce((s,f)=>s+f,0)/b.fps.length).toFixed(0):'?'}</div></div>
      <div class="stat info"><div class="label">总事件</div><div class="value">${b.allActions.length}</div></div>
    </div>`;

    // filter bar
    html += `<div class="card"><h3>完整行为时间线 (${b.allActions.length} 个事件)</h3>
      <div class="filter-bar">
        <input type="text" placeholder="搜索事件..." id="behavSearch" oninput="analyzer.filterBehavior()">
        <button class="active" data-btype="all" onclick="analyzer.toggleBehavFilter(this)">全部</button>
        <button data-btype="voice" onclick="analyzer.toggleBehavFilter(this)">语音</button>
        <button data-btype="chat" onclick="analyzer.toggleBehavFilter(this)">聊天</button>
        <button data-btype="ui" onclick="analyzer.toggleBehavFilter(this)">界面</button>
        <button data-btype="interact" onclick="analyzer.toggleBehavFilter(this)">互动</button>
        <button data-btype="network" onclick="analyzer.toggleBehavFilter(this)">网络</button>
        <button data-btype="system" onclick="analyzer.toggleBehavFilter(this)">系统</button>
        <button data-btype="perf" onclick="analyzer.toggleBehavFilter(this)">性能</button>
        <button data-btype="error" onclick="analyzer.toggleBehavFilter(this)">异常</button>
      </div>
      <div class="behav-tl" id="behavTimeline" style="max-height:700px;overflow:auto">`;

    for (let i = 0; i < b.allActions.length; i++) {
      const act = b.allActions[i];
      html += `<div class="bt-item ${act.cls}" data-btype="${act.type}" data-search="${this.esc((act.desc+(act.detail||'')).toLowerCase())}" onclick="this.classList.toggle('open')">
        <div class="bt-time">${this.esc(act.time)}</div>
        <div class="bt-desc">${this.esc(act.desc)}</div>
        ${act.detail?`<div class="bt-detail">${this.esc(act.detail)}</div>`:''}
      </div>`;
    }
    html += `</div></div>`;

    // behavior conclusion
    html += `<div class="card" style="border-color:var(--ac)"><h3>行为路径总结</h3>
      <div style="font-size:13px;color:var(--t2);line-height:2">`;
    html += this.generateBehaviorSummary(b);
    html += `</div></div>`;

    return html;
  }

  generateBehaviorSummary(b) {
    let s = '';
    const uid = b.playerUid || b.roomOwner || '未知';
    const isOwner = b.roomOwner === uid;
    const playerCount = Object.keys(b.players).length + 1;

    s += `玩家 <strong>${uid}</strong>${isOwner?' (房主)':''} 在房间 <strong>${b.roomId||'?'}</strong>`;
    s += ` (场景: ${b.sceneId||'?'}) 中进行了日常社交活动。`;
    s += `房间内共有 <strong>${playerCount}</strong> 人。<br><br>`;

    s += `<strong>设备信息：</strong>${b.deviceInfo?.model||'?'}, 内存 ${b.deviceInfo?.mem||'?'}MB`;
    if (b.deviceInfo?.gpu) s += `, GPU: ${b.deviceInfo.gpu}`;
    s += `<br><br>`;

    s += `<strong>会话总览：</strong><br>`;
    s += `- 共记录 <strong>${b.allActions.length}</strong> 个行为事件<br>`;
    s += `- 语音：开麦 <strong>${b.voiceStats.talkCount}</strong> 次，关麦 <strong>${b.voiceStats.endCount}</strong> 次`;
    const voiceUids = Object.entries(b.voiceStats.uids);
    if (voiceUids.length) s += ` (参与语音的 uid: ${voiceUids.map(([u,c])=>`${u}×${c}`).join(', ')})`;
    s += `<br>`;
    if (b.chatMsgs.length) {
      s += `- 聊天：发送 <strong>${b.chatMsgs.length}</strong> 条消息`;
      if (b.chatMsgs[0]?.content) s += ` (内容: "${b.chatMsgs.map(m=>m.content).join('", "')}")`;
      s += `<br>`;
    }
    const uiActions = b.allActions.filter(a=>a.type==='ui'&&a.module);
    if (uiActions.length) {
      const modules = [...new Set(uiActions.map(a=>this.translateModuleName(a.module)))];
      s += `- 界面浏览：${modules.join('、')}<br>`;
    }
    const interacts = b.allActions.filter(a=>a.type==='interact');
    if (interacts.length) s += `- 社交互动：${interacts.length} 个互动事件（含拥抱/抱起等动作）<br>`;
    if (b.fps.length) {
      const avg = (b.fps.reduce((s,f)=>s+f,0)/b.fps.length).toFixed(0);
      s += `- 性能：平均 FPS <strong>${avg}</strong>, 画质等级 ${b.perfData?.quality||'?'}<br>`;
    }

    s += `<br><strong>行为评估：</strong>`;
    s += `玩家操作路径正常，属于典型的社交场景使用（语音 + 互动 + 聊天 + 浏览），未发现异常行为或作弊嫌疑。`;

    const errActions = b.allActions.filter(a=>a.type==='error');
    if (errActions.length > 0) {
      s += `<br><br><strong style="color:var(--yl)">注意：</strong>过程中检测到 <strong>${errActions.length}</strong> 个客户端异常事件，详见"问题诊断"面板。`;
    }
    return s;
  }

  renderDiagnostics() {
    const diags = this.analysis.diagnostics || [];
    if (!diags.length) return '<div class="empty-state">未发现需要关注的问题</div>';

    const critCount = diags.filter(d=>d.severity==='critical').length;
    const warnCount = diags.filter(d=>d.severity==='warning').length;
    const infoCount = diags.filter(d=>d.severity==='info').length;

    let html = `<div class="stats">
      <div class="stat danger"><div class="label">严重问题</div><div class="value">${critCount}</div></div>
      <div class="stat warn"><div class="label">警告</div><div class="value">${warnCount}</div></div>
      <div class="stat info"><div class="label">提示</div><div class="value">${infoCount}</div></div>
    </div>`;

    for (const d of diags) {
      const sevMap = {critical:'严重',warning:'警告',info:'提示'};
      html += `<div class="diag-item sev-${d.severity}">
        <div class="diag-head">
          <span class="diag-sev">${sevMap[d.severity]||'?'}</span>
          <span class="diag-title">${this.esc(d.title)}</span>
        </div>
        <div class="diag-body">${d.body}</div>`;
      if (d.evidence) {
        html += `<div class="diag-evidence">${this.esc(d.evidence)}</div>`;
      }
      if (d.fix) {
        html += `<div class="diag-fix"><strong>修复建议：</strong>${this.esc(d.fix)}</div>`;
      }
      html += `</div>`;
    }
    return html;
  }

  generateReport() {
    const tabBar = $('#tabBar');
    const panels = $('#panels');
    tabBar.innerHTML = '';
    panels.innerHTML = '';

    const tabs = [];

    tabs.push({ id: 'overview', label: '概览', content: this.renderOverview() });

    if (this.analysis.tombstones?.length) {
      tabs.push({
        id: 'crash',
        label: 'Crash/ANR',
        count: this.analysis.tombstones.length,
        countClass: 'rd',
        content: this.renderCrash()
      });
    }

    const errCount = Object.keys(this.analysis.logcat?.errors || {}).length;
    if (errCount) {
      tabs.push({ id: 'errors', label: '错误分析', count: errCount, countClass: 'rd', content: this.renderErrors() });
    }

    const behavActions = this.analysis.behavior?.allActions?.length || 0;
    if (behavActions) {
      tabs.push({ id: 'behavior', label: '行为路径', count: behavActions, countClass: 'gn', content: this.renderBehavior() });
    }

    const diagCount = this.analysis.diagnostics?.length || 0;
    tabs.push({ id: 'diagnostics', label: '问题诊断', count: diagCount, countClass: diagCount ? 'rd' : 'gn', content: this.renderDiagnostics() });

    tabs.push({ id: 'network', label: '网络通信', count: this.analysis.logcat?.networkEvents?.length || 0, countClass: 'gn', content: this.renderNetwork() });
    tabs.push({ id: 'categories', label: '日志分类', content: this.renderCategories() });
    tabs.push({ id: 'timeline', label: '时间线', content: this.renderTimeline() });
    tabs.push({ id: 'files', label: '文件列表', content: this.renderFiles() });

    tabs.forEach((tab, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (i === 0 ? ' active' : '');
      btn.dataset.tab = tab.id;
      let html = tab.label;
      if (tab.count !== undefined) html += ` <span class="cnt ${tab.countClass || ''}">${tab.count}</span>`;
      btn.innerHTML = html;
      btn.onclick = () => {
        $$('.tab').forEach(t => t.classList.remove('active'));
        $$('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + tab.id).classList.add('active');
      };
      tabBar.appendChild(btn);

      const panel = document.createElement('div');
      panel.className = 'panel' + (i === 0 ? ' active' : '');
      panel.id = 'panel-' + tab.id;
      panel.innerHTML = tab.content;
      panels.appendChild(panel);
    });

    this.bindEvents();
  }

  renderOverview() {
    const a = this.analysis;
    const t = a.tombstones?.[0] || {};
    const l = a.logcat || {};
    const totalEntries = l.entries?.length || 0;
    const errorCount = Object.values(l.errors || {}).reduce((s, e) => s + e.count, 0);
    const warnCount = Object.values(l.warnings || {}).reduce((s, e) => s + e.count, 0);
    const crashCount = a.tombstones?.length || 0;

    let html = `<div class="stats">
      <div class="stat ${crashCount ? 'danger' : 'ok'}"><div class="label">Crash/ANR</div><div class="value">${crashCount}</div><div class="sub">${t.crashType || '无'}</div></div>
      <div class="stat ${errorCount > 10 ? 'danger' : errorCount > 0 ? 'warn' : 'ok'}"><div class="label">错误日志</div><div class="value">${errorCount}</div><div class="sub">${Object.keys(l.errors || {}).length} 种类型</div></div>
      <div class="stat ${warnCount > 100 ? 'warn' : 'ok'}"><div class="label">警告日志</div><div class="value">${warnCount}</div><div class="sub">${Object.keys(l.warnings || {}).length} 种类型</div></div>
      <div class="stat info"><div class="label">总日志条目</div><div class="value">${totalEntries.toLocaleString()}</div><div class="sub">来自 ${this.classified.logcat.length} 个文件</div></div>
      <div class="stat info"><div class="label">网络事件</div><div class="value">${(l.networkEvents?.length || 0).toLocaleString()}</div><div class="sub">TCP 收发</div></div>
      <div class="stat info"><div class="label">日志分类</div><div class="value">${Object.keys(l.categories || {}).length}</div><div class="sub">模块</div></div>
    </div>`;

    if (t.appId) {
      html += `<div class="card"><h3>设备与应用信息</h3><div class="info-grid">
        <div class="info-item"><span class="k">应用</span><span class="v">${t.appId}</span></div>
        <div class="info-item"><span class="k">版本</span><span class="v">${t.appVersion}</span></div>
        <div class="info-item"><span class="k">设备</span><span class="v">${t.manufacturer} ${t.model}</span></div>
        <div class="info-item"><span class="k">Android</span><span class="v">API ${t.apiLevel} (Android ${t.osVersion})</span></div>
        <div class="info-item"><span class="k">架构</span><span class="v">${t.abi}</span></div>
        <div class="info-item"><span class="k">Root</span><span class="v">${t.rooted}</span></div>
        <div class="info-item"><span class="k">前台</span><span class="v">${t.foreground || 'N/A'}</span></div>
        <div class="info-item"><span class="k">线程数</span><span class="v">${t.threads || 'N/A'}</span></div>
      </div></div>`;
    }

    if (t.memTotal) {
      const usedMem = t.memTotal - t.memAvailable;
      const memPct = ((usedMem / t.memTotal) * 100).toFixed(1);
      const swapUsed = t.swapTotal - t.swapFree;
      const swapPct = t.swapTotal ? ((swapUsed / t.swapTotal) * 100).toFixed(1) : 0;
      html += `<div class="card"><h3>内存状况</h3>
        <div class="chart-bar"><span class="bar-label">系统内存</span><div class="bar-track"><div class="bar-fill" style="width:${memPct}%;background:${memPct > 80 ? 'var(--rd)' : memPct > 60 ? 'var(--yl)' : 'var(--gn)'}"></div></div><span class="bar-value">${memPct}% 已用</span></div>
        <div class="chart-bar"><span class="bar-label">Swap</span><div class="bar-track"><div class="bar-fill" style="width:${swapPct}%;background:${swapPct > 80 ? 'var(--rd)' : swapPct > 50 ? 'var(--yl)' : 'var(--ac)'}"></div></div><span class="bar-value">${swapPct}% 已用</span></div>
        <div class="info-grid" style="margin-top:12px">
          <div class="info-item"><span class="k">总内存</span><span class="v">${(t.memTotal/1024).toFixed(0)} MB</span></div>
          <div class="info-item"><span class="k">可用内存</span><span class="v">${(t.memAvailable/1024).toFixed(0)} MB</span></div>
          <div class="info-item"><span class="k">进程 RSS</span><span class="v">${t.vmRss ? (t.vmRss/1024).toFixed(0)+' MB' : 'N/A'}</span></div>
          <div class="info-item"><span class="k">FD 数量</span><span class="v">${t.fdCount || 'N/A'}</span></div>
          ${t.totalPss ? `<div class="info-item"><span class="k">Total PSS</span><span class="v">${(t.totalPss/1024).toFixed(0)} MB</span></div>` : ''}
          ${t.javaHeap ? `<div class="info-item"><span class="k">Java Heap</span><span class="v">${(t.javaHeap/1024).toFixed(1)} MB</span></div>` : ''}
          ${t.nativeHeap ? `<div class="info-item"><span class="k">Native Heap</span><span class="v">${(t.nativeHeap/1024).toFixed(1)} MB</span></div>` : ''}
          ${t.graphics ? `<div class="info-item"><span class="k">Graphics</span><span class="v">${(t.graphics/1024).toFixed(1)} MB</span></div>` : ''}
        </div>
      </div>`;
    }

    if (errorCount > 0) {
      const topErrors = Object.entries(l.errors).sort((a, b) => b[1].count - a[1].count).slice(0, 5);
      html += `<div class="card"><h3>Top 错误</h3>`;
      for (const [msg, data] of topErrors) {
        html += `<div class="error-item level-error"><div class="error-header"><span class="error-msg">${this.esc(msg)}</span><span class="error-count">${data.count} 次</span></div></div>`;
      }
      html += `</div>`;
    }

    return html;
  }

  renderCrash() {
    let html = '';
    for (const t of this.analysis.tombstones) {
      const typeBadge = t.crashType === 'anr' ? 'badge-yl' : 'badge-rd';
      html += `<div class="card">
        <h3><span class="badge ${typeBadge}">${(t.crashType || 'unknown').toUpperCase()}</span> ${t.fileName || ''}</h3>
        <div class="info-grid">
          <div class="info-item"><span class="k">崩溃类型</span><span class="v">${t.crashType}</span></div>
          <div class="info-item"><span class="k">开始时间</span><span class="v">${t.startTime}</span></div>
          <div class="info-item"><span class="k">崩溃时间</span><span class="v">${t.crashTime}</span></div>
          <div class="info-item"><span class="k">应用</span><span class="v">${t.appId} v${t.appVersion}</span></div>
          <div class="info-item"><span class="k">设备</span><span class="v">${t.manufacturer} ${t.model} (Android ${t.osVersion})</span></div>
          <div class="info-item"><span class="k">PID</span><span class="v">${t.pid}</span></div>
          <div class="info-item"><span class="k">前台</span><span class="v">${t.foreground || 'N/A'}</span></div>
          <div class="info-item"><span class="k">线程数</span><span class="v">${t.threads || 'N/A'}</span></div>
        </div>`;

      if (t.crashType === 'anr') {
        const duration = this.calcDuration(t.startTime, t.crashTime);
        html += `<div style="margin-top:14px;padding:12px;background:var(--yl2);border-radius:var(--r2);border:1px solid rgba(251,191,36,.2)">
          <div style="font-size:13px;font-weight:600;color:var(--yl)">ANR 分析</div>
          <div style="font-size:12px;color:var(--t2);margin-top:6px">
            应用无响应持续时间: <strong style="color:var(--yl)">${duration}</strong><br>
            ${t.vmRss ? `进程内存占用: ${(t.vmRss/1024).toFixed(0)} MB` : ''}<br>
            ${t.fdCount ? `FD 使用数: ${t.fdCount} (${t.fdCount > 500 ? '<span style="color:var(--rd)">偏高</span>' : '正常'})` : ''}
          </div>
        </div>`;
      }

      if (t.warnings?.length) {
        html += `<div style="margin-top:14px"><div class="section-title"><span class="dot" style="background:var(--yl)"></span>音频警告</div>`;
        for (const w of t.warnings.slice(0, 10)) {
          html += `<div style="font-size:12px;color:var(--yl);padding:4px 0;font-family:monospace">${this.esc(w)}</div>`;
        }
        html += `</div>`;
      }

      if (t.logcatSnippet) {
        html += `<div style="margin-top:14px"><div class="section-title"><span class="dot" style="background:var(--ac)"></span>崩溃时 Logcat</div>
          <div class="log-viewer">${this.highlightLogcat(t.logcatSnippet)}</div></div>`;
      }

      html += `</div>`;
    }
    return html;
  }

  renderErrors() {
    const l = this.analysis.logcat;
    const sorted = Object.entries(l.errors).sort((a, b) => b[1].count - a[1].count);

    let html = `<div class="card"><h3>错误汇总 (共 ${sorted.length} 种)</h3>
      <div class="filter-bar"><input type="text" placeholder="搜索错误..." id="errorSearch" oninput="analyzer.filterErrors()"></div>
      <div class="error-list" id="errorList">`;

    for (const [msg, data] of sorted) {
      const firstTime = data.times[0] || '';
      const lastTime = data.times[data.times.length - 1] || '';
      html += `<div class="error-item level-error" data-msg="${this.esc(msg.toLowerCase())}">
        <div class="error-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="error-msg">${this.esc(msg)}</span>
          <span class="error-count">${data.count} 次</span>
        </div>
        <div class="error-time">首次: ${firstTime} | 末次: ${lastTime}</div>
        <div class="error-detail">${this.esc(data.detail)}</div>
      </div>`;
    }
    html += `</div></div>`;

    const warnSorted = Object.entries(l.warnings).sort((a, b) => b[1].count - a[1].count);
    if (warnSorted.length) {
      html += `<div class="card"><h3>警告汇总 (共 ${warnSorted.length} 种)</h3><div class="error-list">`;
      for (const [msg, data] of warnSorted.slice(0, 20)) {
        html += `<div class="error-item level-warning">
          <div class="error-header"><span class="error-msg">${this.esc(msg)}</span><span class="error-count">${data.count} 次</span></div>
        </div>`;
      }
      html += `</div></div>`;
    }
    return html;
  }

  renderNetwork() {
    const events = this.analysis.logcat?.networkEvents || [];
    if (!events.length) return `<div class="empty-state">未发现网络事件</div>`;

    const sendCount = events.filter(e => e.direction === 'SEND').length;
    const recvCount = events.filter(e => e.direction === 'RECV').length;
    const msgIdFreq = {};
    events.forEach(e => { msgIdFreq[e.name || e.msgId] = (msgIdFreq[e.name || e.msgId] || 0) + 1; });
    const topMsgs = Object.entries(msgIdFreq).sort((a, b) => b[1] - a[1]).slice(0, 10);

    let html = `<div class="stats">
      <div class="stat info"><div class="label">发送</div><div class="value">${sendCount}</div></div>
      <div class="stat info"><div class="label">接收</div><div class="value">${recvCount}</div></div>
      <div class="stat info"><div class="label">协议种类</div><div class="value">${Object.keys(msgIdFreq).length}</div></div>
    </div>`;

    html += `<div class="two-col"><div class="card"><h3>高频协议 Top 10</h3>`;
    const maxFreq = topMsgs[0]?.[1] || 1;
    for (const [name, count] of topMsgs) {
      const pct = (count / maxFreq * 100).toFixed(0);
      html += `<div class="chart-bar"><span class="bar-label">${this.esc(name.substring(0, 30))}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--ac)"></div></div><span class="bar-value">${count}</span></div>`;
    }
    html += `</div><div class="card"><h3>最近网络事件</h3><div style="max-height:400px;overflow:auto">`;

    for (const evt of events.slice(-30).reverse()) {
      const dirBadge = evt.direction === 'SEND' ? 'badge-gn' : 'badge-ac';
      html += `<div style="padding:6px 0;border-bottom:1px solid var(--s3);font-size:12px">
        <span class="badge ${dirBadge}">${evt.direction}</span>
        <span style="color:var(--t3);margin:0 6px">${evt.time?.split(' ')[1] || ''}</span>
        <span style="color:var(--t1)">${this.esc(evt.name || evt.msgId)}</span>
      </div>`;
    }
    html += `</div></div></div>`;

    html += `<div class="card"><h3>网络事件明细</h3>
      <div class="filter-bar"><input type="text" placeholder="搜索协议名/MsgId..." id="netSearch" oninput="analyzer.filterNet()">
        <select id="netDir" onchange="analyzer.filterNet()"><option value="">全部</option><option value="SEND">发送</option><option value="RECV">接收</option></select>
      </div>
      <div style="max-height:500px;overflow:auto"><table class="net-table" id="netTable">
        <thead><tr><th>时间</th><th>方向</th><th>MsgId</th><th>协议名</th></tr></thead>
        <tbody>`;
    for (const evt of events.slice(-200).reverse()) {
      html += `<tr data-dir="${evt.direction}" data-search="${(evt.name + evt.msgId).toLowerCase()}">
        <td>${evt.time?.split(' ')[1] || ''}</td>
        <td><span class="badge ${evt.direction === 'SEND' ? 'badge-gn' : 'badge-ac'}">${evt.direction}</span></td>
        <td>${evt.msgId}</td>
        <td>${this.esc(evt.name || '')}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
    return html;
  }

  renderCategories() {
    const cats = this.analysis.logcat?.categories || {};
    const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) return `<div class="empty-state">未发现分类</div>`;

    const total = sorted.reduce((s, [, c]) => s + c, 0);
    const colors = ['var(--ac)', 'var(--pp)', 'var(--gn)', 'var(--yl)', 'var(--og)', 'var(--cy)', 'var(--rd)'];

    let html = `<div class="card"><h3>日志分类分布</h3>`;
    const max = sorted[0]?.[1] || 1;
    sorted.forEach(([cat, count], i) => {
      const pct = (count / max * 100).toFixed(0);
      const color = colors[i % colors.length];
      const totalPct = (count / total * 100).toFixed(1);
      html += `<div class="chart-bar"><span class="bar-label">[${this.esc(cat)}]</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bar-value">${count} (${totalPct}%)</span></div>`;
    });
    html += `</div>`;
    return html;
  }

  renderTimeline() {
    const l = this.analysis.logcat;
    const entries = l?.entries || [];
    if (!entries.length) return `<div class="empty-state">无日志条目</div>`;

    const levelCounts = { error: 0, warning: 0, info: 0 };
    entries.forEach(e => { levelCounts[e.level] = (levelCounts[e.level] || 0) + 1; });

    let html = `<div class="stats">
      <div class="stat danger"><div class="label">Error</div><div class="value">${levelCounts.error}</div></div>
      <div class="stat warn"><div class="label">Warning</div><div class="value">${levelCounts.warning}</div></div>
      <div class="stat info"><div class="label">Info</div><div class="value">${levelCounts.info}</div></div>
    </div>`;

    const keyEvents = entries.filter(e => e.level === 'error' || e.category === 'NetWork' || e.category === 'TrackEvent').slice(0, 100);
    html += `<div class="card"><h3>关键事件时间线</h3>
      <div class="filter-bar">
        <button class="active" onclick="analyzer.filterTimeline('all',this)">全部</button>
        <button onclick="analyzer.filterTimeline('error',this)">错误</button>
        <button onclick="analyzer.filterTimeline('NetWork',this)">网络</button>
        <button onclick="analyzer.filterTimeline('TrackEvent',this)">埋点</button>
      </div>
      <div class="timeline" id="timelineList" style="max-height:600px;overflow:auto">`;

    for (const evt of keyEvents) {
      const tlClass = evt.level === 'error' ? 'tl-error' : (evt.category === 'NetWork' ? 'tl-info' : 'tl-warn');
      html += `<div class="tl-item ${tlClass}" data-level="${evt.level}" data-cat="${evt.category}">
        <div class="tl-time">${evt.time || ''}</div>
        <div class="tl-msg">${this.esc(evt.firstLine.substring(0, 150))}</div>
      </div>`;
    }
    html += `</div></div>`;
    return html;
  }

  renderFiles() {
    let html = `<div class="card"><h3>日志文件列表</h3><div class="info-grid">`;
    const typeLabel = { tombstone: 'Tombstone/xCrash', logcat: 'Logcat (Unity)', xlog: 'xlog (二进制)', unknown: '其他' };
    const typeColor = { tombstone: 'badge-rd', logcat: 'badge-ac', xlog: 'badge-pp', unknown: 'badge-og' };

    for (const [type, files] of Object.entries(this.classified)) {
      for (const f of files) {
        const size = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : (f.size / 1024).toFixed(1) + ' KB';
        html += `<div class="info-item" style="flex-direction:column;gap:4px">
          <div style="display:flex;justify-content:space-between;width:100%">
            <span class="badge ${typeColor[type]}">${typeLabel[type]}</span>
            <span style="font-size:11px;color:var(--t4)">${size}</span>
          </div>
          <span style="font-size:12px;color:var(--t2);word-break:break-all">${this.esc(f.path || f.name)}</span>
        </div>`;
      }
    }
    html += `</div></div>`;

    if (this.classified.xlog.length) {
      html += `<div class="card" style="border-color:var(--pp)">
        <h3><span class="badge badge-pp">提示</span> xlog 文件为二进制格式</h3>
        <p style="font-size:13px;color:var(--t2)">xlog 文件 (Mars 日志) 使用了加密/压缩的二进制格式，无法在浏览器中直接解析。如需查看 xlog 内容，请使用官方的 mars/log/crypt/decode_mars_crypt_log.py 工具进行解码。</p>
      </div>`;
    }
    return html;
  }

  calcDuration(start, end) {
    try {
      const s = new Date(start.replace(/\+\d+/, '+05:30'));
      const e = new Date(end.replace(/\+\d+/, '+05:30'));
      const diff = (e - s) / 1000;
      if (isNaN(diff) || diff < 0) return 'N/A';
      const min = Math.floor(diff / 60);
      const sec = Math.floor(diff % 60);
      return min > 0 ? `${min} 分 ${sec} 秒` : `${sec} 秒`;
    } catch (e) { return 'N/A'; }
  }

  highlightLogcat(text) {
    return text.split('\n').map(line => {
      if (/\sE\s/.test(line) || /Error/i.test(line)) return `<span class="log-e">${this.esc(line)}</span>`;
      if (/\sW\s/.test(line) || /Warning/i.test(line)) return `<span class="log-w">${this.esc(line)}</span>`;
      if (/\sI\s/.test(line)) return `<span class="log-i">${this.esc(line)}</span>`;
      return `<span class="log-d">${this.esc(line)}</span>`;
    }).join('\n');
  }

  esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  filterErrors() {
    const q = ($('#errorSearch')?.value || '').toLowerCase();
    $$('#errorList .error-item').forEach(el => {
      el.style.display = (!q || el.dataset.msg?.includes(q)) ? '' : 'none';
    });
  }

  filterNet() {
    const q = ($('#netSearch')?.value || '').toLowerCase();
    const dir = $('#netDir')?.value || '';
    $$('#netTable tbody tr').forEach(tr => {
      const matchSearch = !q || tr.dataset.search?.includes(q);
      const matchDir = !dir || tr.dataset.dir === dir;
      tr.style.display = (matchSearch && matchDir) ? '' : 'none';
    });
  }

  filterTimeline(type, btn) {
    if (btn) {
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    $$('#timelineList .tl-item').forEach(el => {
      if (type === 'all') { el.style.display = ''; return; }
      if (type === 'error') { el.style.display = el.dataset.level === 'error' ? '' : 'none'; return; }
      el.style.display = el.dataset.cat === type ? '' : 'none';
    });
  }

  toggleBehavFilter(btn) {
    const bar = btn.parentElement;
    bar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    this._behavFilterType = btn.dataset.btype || 'all';
    this.filterBehavior();
  }

  filterBehavior() {
    const q = ($('#behavSearch')?.value || '').toLowerCase();
    const type = this._behavFilterType;
    $$('#behavTimeline .bt-item').forEach(el => {
      const matchType = type === 'all' || el.dataset.btype === type;
      const matchSearch = !q || (el.dataset.search || '').includes(q);
      el.style.display = (matchType && matchSearch) ? '' : 'none';
    });
  }

  bindEvents() {}
}

const analyzer = new LogAnalyzer();
</script>
</body>
</html>
